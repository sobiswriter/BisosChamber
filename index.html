<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biso's Chamber</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Quicksand', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      min-height: 100vh;
      transition: background 0.3s ease;
    }

    body.light-theme {
      background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
    }

    body.dark-theme {
      background: linear-gradient(135deg, #111111 0%, #1a1a1a 100%);
    }

    .glass {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: background 0.3s ease, border 0.3s ease;
    }

    .light .glass {
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }

    .dark .glass {
      background: rgba(24, 24, 24, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .resizer-handle {
      width: 4px;
      height: 100%;
      cursor: col-resize;
      position: absolute;
      right: 0;
      top: 0;
      z-index: 50;
      transition: background 0.2s ease;
    }

    .resizer-handle:hover,
    .resizer-handle:active {
      background: rgba(245, 158, 11, 0.3);
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.08);
      border-radius: 10px;
    }

    .dark .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.05);
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.15);
    }

    .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    @keyframes spectral-glow {

      0%,
      100% {
        box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
      }

      50% {
        box-shadow: 0 0 25px rgba(99, 102, 241, 0.4);
      }
    }

    .ghost-glow {
      animation: spectral-glow 3s infinite ease-in-out;
    }

    /* Mobile Responsive Styles */
    @media (max-width: 768px) {
      .mobile-sidebar {
        position: fixed;
        left: 0;
        top: 0;
        height: 100vh;
        width: 85vw !important;
        max-width: 320px;
        z-index: 1000;
        transform: translateX(-100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .mobile-sidebar.open {
        transform: translateX(0);
        box-shadow: 4px 0 24px rgba(0, 0, 0, 0.3);
      }

      /* IMPORTANT: Hide sidebar by default on mobile */
      @media (max-width: 768px) {
        .mobile-sidebar:not(.open) {
          display: none;
        }
      }

      .mobile-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 999;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease-in-out;
        backdrop-filter: blur(4px);
      }

      .mobile-backdrop.open {
        opacity: 1;
        pointer-events: auto;
      }

      .hamburger-button {
        position: fixed;
        top: 1rem;
        left: 1rem;
        z-index: 998;
        width: 52px;
        height: 52px;
        border-radius: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.85) 100%);
        border: 1px solid rgba(245, 158, 11, 0.2);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12), 0 2px 8px rgba(245, 158, 11, 0.1);
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .dark .hamburger-button {
        background: linear-gradient(135deg, rgba(41, 37, 36, 0.98) 0%, rgba(28, 25, 23, 0.95) 100%);
        border-color: rgba(245, 158, 11, 0.3);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4), 0 2px 8px rgba(245, 158, 11, 0.15);
      }

      .hamburger-button:hover {
        transform: scale(1.05);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18), 0 4px 12px rgba(245, 158, 11, 0.2);
      }

      .hamburger-button:active {
        transform: scale(0.95);
      }

      .hamburger-icon {
        width: 24px;
        height: 18px;
        position: relative;
        transform: rotate(0deg);
        transition: 0.5s ease-in-out;
      }

      .hamburger-icon span {
        display: block;
        position: absolute;
        height: 3px;
        width: 100%;
        background: linear-gradient(90deg, #78716c 0%, #a8a29e 100%);
        border-radius: 9px;
        opacity: 1;
        left: 0;
        transform: rotate(0deg);
        transition: 0.25s ease-in-out;
      }

      .dark .hamburger-icon span {
        background: linear-gradient(90deg, #d6d3d1 0%, #f5f5f4 100%);
      }

      .hamburger-icon span:nth-child(1) {
        top: 0px;
      }

      .hamburger-icon span:nth-child(2) {
        top: 7px;
      }

      .hamburger-icon span:nth-child(3) {
        top: 14px;
      }

      .hamburger-button.open .hamburger-icon span:nth-child(1) {
        top: 7px;
        transform: rotate(135deg);
        background: linear-gradient(90deg, #f59e0b 0%, #fbbf24 100%);
      }

      .hamburger-button.open .hamburger-icon span:nth-child(2) {
        opacity: 0;
        left: -60px;
      }

      .hamburger-button.open .hamburger-icon span:nth-child(3) {
        top: 7px;
        transform: rotate(-135deg);
        background: linear-gradient(90deg, #f59e0b 0%, #fbbf24 100%);
      }

      /* Hide resizer on mobile */
      .mobile-sidebar .resizer-handle {
        display: none !important;
      }

      /* Adjust modal sizing for mobile */
      .modal-container {
        max-width: 100% !important;
        max-height: 100% !important;
        width: 100vw !important;
        height: 100vh !important;
        margin: 0 !important;
        border-radius: 0 !important;
      }

      /* Responsive padding adjustments */
      .mobile-padding {
        padding: 1rem !important;
      }

      /* Responsive text sizes */
      .mobile-text-adjust h1 {
        font-size: 1.25rem !important;
      }

      .mobile-text-adjust h2 {
        font-size: 1.1rem !important;
      }

      /* Fix input bar padding on mobile */
      .chat-input-container {
        padding: 0.75rem !important;
      }
    }

    /* Tablet adjustments */
    @media (min-width: 769px) and (max-width: 1024px) {
      .tablet-adjust {
        font-size: 0.95rem;
      }
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",

}
</script>

</head>

  <div id="root"></div>

</body>

</html>
